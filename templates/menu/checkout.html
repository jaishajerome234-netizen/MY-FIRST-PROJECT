{% extends 'base.html' %}
{% block title %}Checkout – FoodieRush{% endblock %}
{% block content %}
<div class="section">
  <h2 class="section-title">📦 Checkout</h2>
  <div class="two-col">
    <form method="post">{% csrf_token %}
      <div style="background:#fff;border-radius:14px;padding:1.5rem;box-shadow:var(--shadow);">
        <h3 style="margin-bottom:1.2rem;">Delivery Details</h3>
        <div class="form-group">
          <label>Delivery Address *</label>
          <textarea name="address" rows="3" required placeholder="Enter your full delivery address"></textarea>
        </div>
        <div class="form-group">
          <label>Phone Number *</label>
          <input type="tel" name="phone" required placeholder="+91 98765 43210">
        </div>
        <div class="form-group">
          <label>Special Instructions</label>
          <textarea name="notes" rows="2" placeholder="Any notes for the kitchen or delivery…"></textarea>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">🎉 Place Order</button>
      </div>
    </form>
    <div class="cart-summary">
      <h3 style="margin-bottom:1rem;">Your Items</h3>
      {% for ci in cart_items %}
      <div style="display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.9rem;">
        <span>{{ ci.item.name }} × {{ ci.qty }}</span><span>₹{{ ci.subtotal }}</span>
      </div>
      {% endfor %}
      <hr class="divider">
      <div style="display:flex;justify-content:space-between;"><span class="fw-bold">Total</span><span class="cart-total">₹{{ total }}</span></div>
    </div>
  </div>
</div>
{% endblock %}
