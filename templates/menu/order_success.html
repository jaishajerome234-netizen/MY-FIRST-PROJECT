{% extends 'base.html' %}
{% block title %}Order Placed! – FoodieRush{% endblock %}
{% block content %}
<div class="section">
  <div class="success-box">
    <div class="success-icon">🎉</div>
    <h1>Order Placed!</h1>
    <p style="color:#6B7280;margin-bottom:.5rem;">Your order <strong>#{{ order.id }}</strong> has been received.</p>
    <p style="color:#6B7280;margin-bottom:2rem;">We're preparing it now and will deliver to you shortly.</p>
    <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;">
      <a href="{% url 'order_detail' order.pk %}" class="btn btn-primary">View Order Details</a>
      <a href="{% url 'menu_list' %}" class="btn btn-dark">Order More Food</a>
    </div>
  </div>
</div>
{% endblock %}
